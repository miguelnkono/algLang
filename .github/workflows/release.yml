name: Build and Release Native Binaries

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0, v1.1.0, etc.
  workflow_dispatch:  # Allows manual triggering

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Run tests
        run: mvn test

      - name: Build JAR
        run: mvn clean package

      - name: Test JAR with example programs
        run: |
          JAR_FILE="target/algoLang-1.1.0-jar-with-dependencies.jar"
          if [ -d "src/examples/new" ]; then
            echo "Testing example programs..."
            for example in src/examples/new/*.al; do
              if [ -f "$example" ]; then
                echo "Testing: $example"
                java -jar "$JAR_FILE" "$example" || echo "Warning: $example failed"
              fi
            done
          else
            echo "No example programs found in src/examples/new"
          fi

      - name: Build native executable (Linux)
        run: |
          mvn -Pnative clean package
          chmod +x target/algolang

      - name: Test native executable with simple program
        run: |
          echo 'Algorithme: test;
          Variables:
              x : entier;
          Debut:
              x <- 42;
              ecrire("Test: " + x);
          Fin' > test.al
          ./target/algolang test.al

      - name: Test native executable with example programs
        run: |
          if [ -d "src/examples/new" ]; then
            echo "Testing native executable with examples..."
            for example in src/examples/new/*.al; do
              if [ -f "$example" ]; then
                echo "Testing native: $example"
                ./target/algolang "$example" || echo "Warning: $example failed"
              fi
            done
          fi

      - name: Create tarball
        run: |
          cd target
          tar -czf algolang-linux-x64.tar.gz algolang
          cd ..

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: algolang-linux-x64
          path: target/algolang-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Run tests
        run: mvn test

      - name: Build JAR
        run: mvn clean package

      - name: Test JAR with example programs
        run: |
          $JAR_FILE = "target/algoLang-1.1.0-jar-with-dependencies.jar"
          if (Test-Path "src/examples/new") {
            Write-Host "Testing example programs..."
            Get-ChildItem -Path "src/examples/new" -Filter "*.al" | ForEach-Object {
              Write-Host "Testing: $($_.FullName)"
              java -jar $JAR_FILE $_.FullName
              if ($LASTEXITCODE -ne 0) {
                Write-Host "Warning: $($_.Name) failed"
              }
            }
          } else {
            Write-Host "No example programs found in src/examples/new"
          }

      - name: Build native executable (Windows)
        run: |
          mvn -Pnative clean package

      - name: Test native executable with simple program
        run: |
          @"
          Algorithm: test;
          Variables:
              x : integer;
          Begin:
              x <- 42;
              write("Test: " + x);
          End
          "@ | Out-File -FilePath test.al -Encoding UTF8
          .\target\algolang.exe test.al --language=1

      - name: Test native executable with example programs
        run: |
          if (Test-Path "src/examples/new") {
            Write-Host "Testing native executable with examples..."
            Get-ChildItem -Path "src/examples/new" -Filter "*.al" | ForEach-Object {
              Write-Host "Testing native: $($_.FullName)"
              .\target\algolang.exe $_.FullName
              if ($LASTEXITCODE -ne 0) {
                Write-Host "Warning: $($_.Name) failed"
              }
            }
          }

      - name: Create zip archive
        run: |
          cd target
          Compress-Archive -Path algolang.exe -DestinationPath algolang-windows-x64.zip
          cd ..

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: algolang-windows-x64
          path: target/algolang-windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Run tests
        run: mvn test

      - name: Build JAR
        run: mvn clean package

      - name: Test JAR with example programs
        run: |
          JAR_FILE="target/algoLang-1.1.0-jar-with-dependencies.jar"
          if [ -d "src/examples/new" ]; then
            echo "Testing example programs..."
            for example in src/examples/new/*.al; do
              if [ -f "$example" ]; then
                echo "Testing: $example"
                java -jar "$JAR_FILE" "$example" || echo "Warning: $example failed"
              fi
            done
          else
            echo "No example programs found in src/examples/new"
          fi

      - name: Build native executable (macOS)
        run: |
          mvn -Pnative clean package
          chmod +x target/algolang

      - name: Test native executable with simple program
        run: |
          echo 'Algorithm: test;
          Variables:
              x : integer;
          Begin:
              x <- 42;
              write("Test: " + x);
          End' > test.al
          ./target/algolang test.al --language=1

      - name: Test native executable with example programs
        run: |
          if [ -d "src/examples/new" ]; then
            echo "Testing native executable with examples..."
            for example in src/examples/new/*.al; do
              if [ -f "$example" ]; then
                echo "Testing native: $example"
                ./target/algolang "$example" || echo "Warning: $example failed"
              fi
            done
          fi

      - name: Create tarball
        run: |
          cd target
          tar -czf algolang-macos-x64.tar.gz algolang
          cd ..

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: algolang-macos-x64
          path: target/algolang-macos-x64.tar.gz

  create-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/algolang-linux-x64/algolang-linux-x64.tar.gz
            artifacts/algolang-windows-x64/algolang-windows-x64.zip
            artifacts/algolang-macos-x64/algolang-macos-x64.tar.gz
          body: |
            ## AlgoLang Native Binaries
            
            Download the appropriate binary for your platform:
            
            - **Linux (x64)**: `algolang-linux-x64.tar.gz`
            - **Windows (x64)**: `algolang-windows-x64.zip`
            - **macOS (x64)**: `algolang-macos-x64.tar.gz`
            
            ### Installation
            
            #### Linux / macOS
            ```bash
            tar -xzf algolang-*.tar.gz
            chmod +x algolang
            ./algolang your-program.al
            ```
            
            #### Windows
            ```cmd
            # Extract the zip file
            algolang.exe your-program.al
            ```
            
            ### Usage
            
            ```bash
            # French mode (default)
            algolang program.al
            
            # English mode
            algolang program.al --language=1
            ```
            
            ### What's New
            
            This release includes:
            - Complete AlgoLang interpreter with all features
            - Support for functions, arrays, structures
            - Loops (for, while, do-while)
            - File I/O operations
            - Bilingual support (French/English)
            - Enhanced REPL
            - All example programs tested
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
